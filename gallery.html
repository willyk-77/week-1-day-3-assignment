<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Gallery</title>
  </head>
  <body>
    <header class="header-container">
        <h1 class="gallery-title">Kenya in Pictures</Picture></h1>
        <h3 class="gallery-subtitle">Get lost in Kenya's magical Places</h3>
    </header>
    <main class="main-container">
      <!-- Item 1 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=1"
          alt="Image of a landmark in Kenya"
          class="image-1"
        />
        <figcaption>
          Masai Mara - Home to the world's greatest wildlife spectacle, the
          Great Wildebeest Migration. Vast golden savannah teeming with lions,
          elephants, and cheetahs year round.
        </figcaption>
      </figure>

      <!-- Item 2 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=2"
          alt="Image of a landmark in Kenya"
          class="image-2"
        />
        <figcaption>
          Amboseli National Park — Iconic views of Mount Kilimanjaro towering
          over herds of free-roaming elephants. One of the best places on earth
          to see big tuskers up close.
        </figcaption>
      </figure>

      <!-- Item 3 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=3"
          alt="Image of a landmark in Kenya"
          class="image-3"
        />
        <figcaption>
          Lake Nakuru — A shimmering soda lake famous for flocks of pink
          flamingos coating its shores. Also home to both black and white
          rhinos, lions, and leopards.
        </figcaption>
      </figure>

      <!-- Item 4 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=4"
          alt="Image of a landmark in Kenya"
          class="image-4"
        />
        <figcaption>
          Mount Kenya — Africa's second highest peak, capped with glaciers and
          dramatic rocky peaks. A world-class trekking destination wrapped in
          moorland, forests, and alpine lakes.
        </figcaption>
      </figure>

      <!-- Item 5 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=5"
          alt="Image of a landmark in Kenya"
          class="image-5"
        />
        <figcaption>
          Tsavo National Park — Kenya's largest park, split into East and West,
          famous for its red dust-coated elephants. A vast wilderness of lava
          flows, rivers, and endless open plains.
        </figcaption>
      </figure>

      <!-- Item 6 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=6"
          alt="Image of a landmark in Kenya"
          class="image-6"
        />
        <figcaption>
          Diani Beach — A breathtaking stretch of white coral sand lapped by
          warm turquoise Indian Ocean waters. Lined with swaying palms, coral
          reefs, and some of Africa's finest beach resorts.
        </figcaption>
      </figure>

      <!-- Item 7 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=7"
          alt="Image of a landmark in Kenya"
          class="image-7"
        />
        <figcaption>
          Lamu Old Town — A UNESCO World Heritage Site and Kenya's oldest living
          town, untouched by cars. Narrow winding streets, Swahili architecture,
          and a culture unchanged for centuries.
        </figcaption>
      </figure>

      <!-- Item 8 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=8"
          alt="Image of a landmark in Kenya"
          class="image-8"
        />
        <figcaption>
          Nairobi National Park — The only game reserve in the world sitting on
          the edge of a major capital city. Watch lions and giraffes roam wild
          with a city skyline as the backdrop.
        </figcaption>
      </figure>

      <!-- Item 9 -->
      <figure class="item">
        <img
          src="https://picsum.photos/400/300?random=9"
          alt="Image of a landmark in Kenya"
          class="image-9"
        />
        <figcaption>
          Hell's Gate National Park — A dramatic landscape of towering gorges,
          geysers, and volcanic rock formations. One of the few Kenyan parks
          where you can cycle and hike freely among wildlife.
        </figcaption>
      </figure>
    </main>
    <footer class="footer-container"></footer>
  </body>
</html>
